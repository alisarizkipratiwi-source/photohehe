<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Booth - Total Custom Edition</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <h1 class="logo">Aura Booth</h1>

    <div class="main-layout">
        
        <div class="control-panel">
            <h2>✨ Mulai ✨</h2>
            
            <div class="video-wrapper">
                <video id="kamera" autoplay playsinline></video>
                <div id="countdown">3</div>
            </div>
            
            <button id="tombolJepret" class="btn">📸 Ambil 3 Foto Beruntun</button>
            <div class="or-text">...atau...</div>
            <label for="inputUpload" id="tombolUpload" class="btn btn-upload-label">📂 Unggah 3 Gambar Kustom</label>
            <input type="file" id="inputUpload" multiple accept="image/*" style="display:none">
        </div>
        <div class="frame-panel">
            <h2>✨ Editor Canvas ✨</h2>
            
            <div id="finalWrapper" style="display: flex; justify-content: center; background: #f9f9f9;">
                <canvas id="editorCanvas"></canvas>
            </div>
            
            <button id="tombolTambahStiker" class="btn btn-upload-label" style="background-color: #ffb7b2;">🎀 Tambah Stiker Pita</button>
            
            <button id="tombolDownload" class="btn" disabled>💾 Unduh Photo Strip (.png)</button>
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
